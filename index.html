<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>우당탕탕 사무실 런 - 본부대항전</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 id="page-title">🏢 우당탕탕 사무실 런 🏃</h1>
    <div id="speed-display">지옥의 야근 레이스 시작...</div>
    <div id="game-container">
        <div class="player-area" id="player1-area">
            <div class="hud">
                <span class="label">팀장님 (1P) — <kbd>W</kbd> 점프 / 2단점프</span>
                <span class="score" id="score1">0 m</span>
            </div>
            <canvas id="canvas1" width="1200" height="280"></canvas>
        </div>

        <div class="divider"></div>

        <div class="player-area" id="player2-area">
            <div class="hud">
                <span class="label">사원 (2P) — <kbd>↑</kbd> 점프 / 2단점프</span>
                <span class="score" id="score2">0 m</span>
            </div>
            <canvas id="canvas2" width="1200" height="280"></canvas>
        </div>

        <div id="start-overlay">
            <div class="overlay-content">
                <h1>🏢 우당탕 점프 배틀 : 닥치고 칼퇴! 🏃</h1>
                <p class="rules">
                    <strong class="p1-text">팀장님 (1P)</strong> — <kbd>W</kbd> 키로 점프 (2단점프 가능)<br>
                    <strong class="p2-text">사원 (2P)</strong> — <kbd>↑</kbd> 키로 점프 (2단점프 가능)<br><br>
                    <span style="color:#e74c3c">● 낮음</span> — 1단점프로 통과<br>
                    <span style="color:#e67e22">● 높음 ↑↑</span> — 2단점프 필수<br>
                    <span style="color:#9b59b6">● 공중 ✕</span> — <strong>점프하면 안 됨!</strong> (그냥 달리기)<br><br>
                    장애물에 부딪히면 <strong style="color:#e74c3c">야근 확정</strong>!
                </p>
                <button id="start-btn" class="action-btn">출근하기</button>
            </div>
        </div>

        <div id="overlay" class="hidden">
            <div class="overlay-content">
                <h1 id="result-text">결과</h1>
                <p id="result-detail"></p>
                <button id="restart-btn" class="action-btn">다시 출근 (Space)</button>
            </div>
        </div>

        <div id="countdown" class="hidden">3</div>
    </div>
    <script src="main.js"></script>
</body>
</html>
